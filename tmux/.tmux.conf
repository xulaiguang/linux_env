#============================================================
# Modern tmux Configuration
# Migrated from k-tmux (2015) → tmux 3.4
# Backup: ~/.tmux.conf.bak.*
#============================================================

#--------------------- 基础设置 ------------------------------

# 终端：支持 truecolor（配合 vim termguicolors）
set -g default-terminal "xterm-256color"
set -as terminal-features ",xterm-256color:RGB"

# 前缀键：Ctrl+A（比 Ctrl+B 顺手）
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Escape 延迟：降到 10ms（vim 模式切换更快）
set -s escape-time 10

# 重复键超时
set -g repeat-time 600

# 历史记录
set -g history-limit 100000

# 提示信息持续时间
set -g display-time 3000
set -g display-panes-time 1500

# 窗口/Pane 编号从 1 开始
set -g base-index 1
setw -g pane-base-index 1

# 关闭窗口后自动重新编号
set -g renumber-windows on

# 自动重命名窗口
setw -g automatic-rename on

# 焦点事件（vim autoread 等需要）
set -g focus-events on

# 重载配置
bind R source-file ~/.tmux.conf \; display-message "Config reloaded."

#--------------------- 鼠标 ----------------------------------

set -g mouse on

#--------------------- 窗口操作 ------------------------------

# 创建新窗口（保持当前路径）
bind c new-window -c "#{pane_current_path}"

# Session 切换
bind -r ( switch-client -p
bind -r ) switch-client -n

# 窗口轮转
bind C-o rotate-window

#--------------------- Pane 操作 -----------------------------

# 分屏（保持当前路径）
# \ 垂直分屏（左右）  - 水平分屏（上下）
unbind '"'
unbind %
bind '\' split-window -h -c "#{pane_current_path}"
bind -   split-window -v -c "#{pane_current_path}"

# Pane 切换：Ctrl+h/j/k/l（无需前缀，直接切）
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Pane 大小调整：prefix + H/J/K/L（可重复）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 展示 Pane 编号并跳转
bind q display-panes

# 切换到上一个窗口
bind l last-window

#--------------------- 复制模式 ------------------------------

setw -g mode-keys vi

# 进入/粘贴
bind [ copy-mode
bind ] paste-buffer

# vi 风格选择和复制
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi H   send-keys -X start-of-line
bind -T copy-mode-vi L   send-keys -X end-of-line
bind -T copy-mode-vi Escape send-keys -X cancel

# 鼠标拖选松开后保持选区高亮，不退出复制模式（按 y 手动复制）
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear
# 单击清除选区但不退出复制模式（可继续浏览历史）
bind -T copy-mode-vi MouseDown1Pane send-keys -X clear-selection

#--------------------- 实用快捷键 ----------------------------

# prefix+z: 临时最大化/恢复当前 Pane（tmux 内置）
# 已内置，按 prefix+z 即可

# prefix+x: 关闭当前 Pane（带确认）
# 已内置

# prefix+!: 把当前 Pane 独立成新窗口
# 已内置

# prefix+S: 交换当前 Pane 与上一个 Pane 的位置
bind S swap-pane -U

# prefix+b: 在底部弹出临时小终端（再按一次或 exit 关闭）
bind b popup -d "#{pane_current_path}" -w 80% -h 40% -E

# prefix+f: 在所有窗口中搜索关键词并跳转
bind f command-prompt -p "search:" "find-window -Z -- '%%'"

# prefix+m: 标记当前 Pane（配合 swap-pane -s '{marked}' 使用）
bind m select-pane -m \; display-message "Pane marked"

# prefix+M: 将标记的 Pane 交换到当前位置
bind M swap-pane -s '{marked}' \; display-message "Pane swapped"

#--------------------- 剪贴板 --------------------------------

# OSC 52：vim/tmux 复制自动同步到本地剪贴板（SSH 也生效）
set -g allow-passthrough on
set -s set-clipboard on

#--------------------- 状态栏 --------------------------------

set -g status-position bottom
set -g status-interval 5
set -g status-justify centre

# 配色
set -g status-style "bg=#3c3836,fg=#ebdbb2"

# 左侧：Session 名
set -g status-left-length 30
set -g status-left "#[fg=#a89984][#S]"

# 右侧：日期时间
set -g status-right-length 30
set -g status-right "#[fg=#a89984]%m-%d %H:%M"

# 当前窗口高亮
setw -g window-status-current-style "fg=#fabd2f,bold"
setw -g window-status-current-format " #I:#W#{?window_zoomed_flag,*Z,} "
setw -g window-status-format " #I:#W#{?window_zoomed_flag,*Z,}#{?window_last_flag,-,} "

# 活动窗口提示
setw -g monitor-activity off
set  -g visual-activity off

#--------------------- Pane 边框 -----------------------------

set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#83a598"

#--------------------- 插件 (TPM) --------------------------------

# 插件列表
set -g @plugin 'tmux-plugins/tpm'

# 加载本地配置（不被 dotfiles 覆盖）
if-shell "[ -f ~/.tmux.conf.local ]" "source-file ~/.tmux.conf.local"

# TPM 引导（必须放在配置文件最底部）
run '~/.tmux/plugins/tpm/tpm'
